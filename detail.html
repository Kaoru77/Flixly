<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Film — FLIXLY</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">
        <i class="ti ti-movie"></i> FLIXLY
      </a>
      <a class="nav-watchlist-btn" href="watchlist.html">
        <i class="ti ti-bookmark"></i>
        <span class="wl-text">Watchlist</span>
        <span class="wl-badge" id="navBadge">0</span>
      </a>
    </div>
  </nav>

  <main class="main-content">

    <div class="back-wrap">
      <button class="back-btn" onclick="history.back()">
        <i class="ti ti-arrow-left"></i> Kembali
      </button>
    </div>

    <!-- Info film -->
    <div id="detailBox" class="detail-box">
      <!-- diisi JS -->
      <div class="detail-skeleton"></div>
    </div>

    <!-- Sinopsis -->
    <section id="synopsisSection" style="display:none" class="detail-section">
      <h3 class="section-title">Sinopsis</h3>
      <p id="synopsis" class="synopsis-text"></p>
    </section>

    <!-- Pemeran -->
    <section id="castSection" style="display:none" class="detail-section">
      <div class="section-header">
        <h3 class="section-title">Pemeran</h3>
        <div class="scroll-btns">
          <button onclick="scrollRow('castRow',-1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('castRow',1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="cast-row" id="castRow"></div>
    </section>

    <!-- Film Serupa -->
    <section id="recSection" style="display:none" class="detail-section">
      <div class="section-header">
        <h3 class="section-title">Film Serupa</h3>
        <div class="scroll-btns">
          <button onclick="scrollRow('recRow',-1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('recRow',1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="recRow"></div>
    </section>

  </main>

  <script src="script.js"></script>
   <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo"><i class="ti ti-movie"></i> FLIXLY</span>
      <span class="footer-copy">| © 2026 Flixly |</span>
      <span class="footer-text">Project Pribadi by Taufiq | Data film dari <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a></span>
    </div>
  </footer>
</body>
</html>
