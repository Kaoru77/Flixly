<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLIXLY</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">
        <i class="ti ti-movie"></i> FLIXLY
      </a>

      <!-- Genre filter di navbar -->
      <div class="nav-filters">
        <select id="navGenre" onchange="applyNavFilter()">
          <option value="">Semua Genre</option>
          <option value="28">Action</option>
          <option value="35">Comedy</option>
          <option value="18">Drama</option>
          <option value="27">Horror</option>
          <option value="10749">Romance</option>
          <option value="878">Sci-Fi</option>
          <option value="53">Thriller</option>
          <option value="16">Animation</option>
        </select>

         <!-- Filter tahun di navbar -->
        <select id="navYear" onchange="applyNavFilter()">
          <option value="">Semua Tahun</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2020">2020</option>
          <option value="2019">2019</option>
          <option value="2015">2010–2015</option>
          <option value="2010">2000–2010</option>
        </select>
      </div>

      <!-- Pencarian di navbar -->
      <div class="nav-search">
        <i class="ti ti-search"></i>
        <input type="text" id="navSearch" placeholder="Cari film..." oninput="handleSearch()" />
      </div>
    </div>
  </nav>

  <main class="main-content">

    <!-- Banner besar -->
    <section class="hero" id="heroSection">
      <div class="hero-skeleton"></div>
    </section>

    <!-- Filter hasil pencarian atau filter genre/tahun, muncul di bagian atas halaman utama, tersembunyi secara default. -->
    <section class="row-section" id="filterSection" style="display:none">
      <div class="row-header">
        <h2 class="row-title" id="filterTitle"><i class="ti ti-filter"></i> Hasil Filter</h2>
      </div>
      <div class="movie-grid-full" id="filterGrid"></div>
    </section>

    <!--film trending hari ini, data diambil dari tmdb juga -->
    <section class="row-section">
      <div class="row-header">
        <h2 class="row-title"><i class="ti ti-flame"></i> Trending Hari Ini</h2>
        <div class="scroll-btns">
          <button onclick="scrollRow('trendingRow', -1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('trendingRow', 1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="trendingRow">
        <div class="row-loading"></div>
      </div>
    </section>

    <!--film populer saat ini, data diambil dari tmdb juga-->
    <section class="row-section">
      <div class="row-header">
        <h2 class="row-title"><i class="ti ti-star"></i> Paling Populer</h2>
        <div class="scroll-btns">
          <button onclick="scrollRow('popularRow', -1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('popularRow', 1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="popularRow">
        <div class="row-loading"></div>
      </div>
    </section>

    <!--film dengan rating tertinggi, data diambil dari tmdb juga-->
    <section class="row-section">
      <div class="row-header">
        <h2 class="row-title"><i class="ti ti-award"></i> Rating Tertinggi</h2>
        <div class="scroll-btns">
          <button onclick="scrollRow('topRatedRow', -1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('topRatedRow', 1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="topRatedRow">
        <div class="row-loading"></div>
      </div>
    </section>

    <!--hasil filter-->
    <section class="row-section" id="filterSection" style="display:none">
      <div class="row-header">
        <h2 class="row-title" id="filterTitle"><i class="ti ti-filter"></i> Hasil Filter</h2>
      </div>
      <div class="movie-grid-full" id="filterGrid"></div>
    </section>

    <!--film yang sudah ditambahkan ke watchlist, data disimpan di localStorage browser.-->
    <section class="row-section" id="watchlistSection">
      <div class="row-header">
        <h2 class="row-title">
          <i class="ti ti-bookmark"></i> Watchlist
          <span class="count-badge" id="watchCount">0</span>
        </h2>
      </div>
      <div id="watchlistItems">
        <p class="empty-text"><i class="ti ti-bookmark"></i><br>Belum ada film di watchlist</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
