<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLIXLY</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">
        <i class="ti ti-movie"></i> FLIXLY
      </a>

      <!-- Filter genre -->
      <select id="navGenre" onchange="applyFilter()">
        <option value="">Semua Genre</option>
        <option value="28">Action</option>
        <option value="35">Comedy</option>
        <option value="18">Drama</option>
        <option value="27">Horror</option>
        <option value="10749">Romance</option>
        <option value="878">Sci-Fi</option>
        <option value="53">Thriller</option>
        <option value="16">Animasi</option>
      </select>

      <!-- Search -->
      <div class="nav-search">
        <i class="ti ti-search"></i>
        <input type="text" id="navSearch" placeholder="Cari film..." oninput="handleSearch()" />
      </div>

      <!-- Link ke Watchlist -->
      <a class="nav-watchlist-btn" href="watchlist.html">
        <i class="ti ti-bookmark"></i>
        <span class="wl-text">Watchlist</span>
        <span class="wl-badge" id="navBadge">0</span>
      </a>
    </div>
  </nav>

  <main class="main-content">

    <!-- Hasil pencarian / filter -->
    <section id="filterSection" style="display:none">
      <div class="section-header">
        <h2 id="filterTitle"><i class="ti ti-search"></i> Hasil</h2>
        <button class="clear-btn" onclick="clearFilter()"><i class="ti ti-x"></i> Hapus Filter</button>
      </div>
      <div class="movie-grid" id="filterGrid"></div>
    </section>

    <!-- Trending -->
    <section class="movie-section" id="mainSections">
      <div class="section-header">
        <h2><i class="ti ti-flame"></i> Trending Hari Ini</h2>
        <div class="scroll-btns">
          <button onclick="scrollRow('trendingRow',-1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('trendingRow',1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="trendingRow"><div class="loading-row"></div></div>
    </section>

    <!-- Populer -->
    <section class="movie-section">
      <div class="section-header">
        <h2><i class="ti ti-star"></i> Paling Populer</h2>
        <div class="scroll-btns">
          <button onclick="scrollRow('popularRow',-1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('popularRow',1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="popularRow"><div class="loading-row"></div></div>
    </section>

    <!-- Rating Tertinggi -->
    <section class="movie-section">
      <div class="section-header">
        <h2><i class="ti ti-award"></i> Rating Tertinggi</h2>
        <div class="scroll-btns">
          <button onclick="scrollRow('topRatedRow',-1)"><i class="ti ti-chevron-left"></i></button>
          <button onclick="scrollRow('topRatedRow',1)"><i class="ti ti-chevron-right"></i></button>
        </div>
      </div>
      <div class="movie-row" id="topRatedRow"><div class="loading-row"></div></div>
    </section>
  </main>

  <script src="script.js"></script>
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo"><i class="ti ti-movie"></i> FLIXLY</span>
      <span class="footer-copy">| © 2026 Flixly |</span>
      <span class="footer-text">Project Pribadi by Taufiq | Data film dari <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a></span>
    </div>
  </footer>

</body>
</body>
</html>
